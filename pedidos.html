<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Pedidos de Música — Hollywood</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0d0f;
    --surface:   #141418;
    --border:    #222228;
    --gold:      #c9a84c;
    --gold-dim:  #7a6030;
    --text:      #e8e6e0;
    --muted:     #6b6860;
    --pending:   #c97a4c;
    --done:      #4cc97a;
    --tag-bg:    #1a1a20;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }

  /* ── HEADER ────────────────────────────────── */
  header {
    position: relative;
    border-bottom: 1px solid var(--border);
    padding: 3rem 2rem 2.5rem;
    text-align: center;
    overflow: hidden;
    z-index: 1;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 2px;
    background: var(--gold);
  }

  .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1;
    margin-bottom: 0.6rem;
  }

  h1 span { color: var(--gold); }

  .header-sub {
    color: var(--muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }

  /* ── CONTROLS ──────────────────────────────── */
  .controls {
    max-width: 860px;
    margin: 2rem auto 0;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 220px;
    max-width: 380px;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem 0.7rem 2.5rem;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--gold-dim); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 0.8rem; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 13px;
    pointer-events: none;
  }

  .filter-group {
    display: flex;
    gap: 0.4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px;
  }

  .filter-btn {
    background: none;
    border: none;
    border-radius: 6px;
    padding: 0.4rem 0.9rem;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    white-space: nowrap;
  }

  .filter-btn.active {
    background: var(--border);
    color: var(--text);
  }

  /* ── MAIN ──────────────────────────────────── */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    position: relative; z-index: 1;
  }

  /* ── STATS ─────────────────────────────────── */
  .stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 1.1rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .stat strong { color: var(--text); font-size: 15px; }
  .stat.pend strong { color: var(--pending); }
  .stat.done strong { color: var(--done); }

  /* ── PEDIDO CARD ───────────────────────────── */
  .pedido-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .pedido-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.2rem;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.15s;
  }

  .pedido-card:hover { border-color: var(--gold-dim); }
  .pedido-card.hidden { display: none; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-dot.pending { background: var(--pending); box-shadow: 0 0 6px var(--pending); }
  .status-dot.done    { background: var(--done);    box-shadow: 0 0 6px var(--done); }

  .pedido-info { min-width: 0; }

  .pedido-song {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
  }

  .pedido-meta {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .pedido-right { text-align: right; flex-shrink: 0; }

  .status-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid;
    white-space: nowrap;
  }

  .badge-pending {
    color: var(--pending);
    border-color: var(--pending);
    background: rgba(201,122,76,0.08);
  }

  .badge-done {
    color: var(--done);
    border-color: var(--done);
    background: rgba(76,201,122,0.08);
  }

  .pedido-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── EMPTY / LOADING ───────────────────────── */
  .state-msg {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
  }

  .dot-anim::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%  { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* ── NAV LINK ──────────────────────────────── */
  .nav-link {
    display: inline-block;
    margin-top: 1.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--gold-dim);
    text-decoration: none;
    transition: color 0.15s;
  }

  .nav-link:hover { color: var(--gold); }

  /* ── FOOTER ────────────────────────────────── */
  footer {
    text-align: center;
    padding: 2rem;
    border-top: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    position: relative; z-index: 1;
  }

  @media (max-width: 600px) {
    .pedido-card { grid-template-columns: auto 1fr; }
    .pedido-right { grid-column: 2; text-align: left; }
    .controls { flex-direction: column; align-items: stretch; }
    .search-wrap { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Rede Brazink · Canal #Hollywood</div>
  <h1>🎵 Pedidos de <span>Música</span></h1>
  <p class="header-sub">Fila de inclusões na playlist da rádio</p>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Buscar música ou usuário..." autocomplete="off">
    </div>
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="0">Pendentes</button>
      <button class="filter-btn" data-filter="1">Incluídos</button>
    </div>
  </div>
</header>

<main>
  <div class="stats" id="stats">
    <div class="stat"><span class="dot-anim">Carregando</span></div>
  </div>

  <div class="pedido-list" id="list">
    <div class="state-msg dot-anim">Carregando pedidos</div>
  </div>

  <a href="index.html" class="nav-link">← Ver comandos do bot</a>
</main>

<footer>
  LeBron IRC Bot &bull; #Hollywood &bull; Rede Brazink
</footer>

<script>
// ════════════════════════════════════════════════
//  ⚙️  CONFIGURAÇÃO — só mexa aqui
// ════════════════════════════════════════════════
const SUPABASE_URL = "https://ozycnoaixffetyxbnxgw.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96eWNub2FpeGZmZXR5eGJueGd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5Mzg5OTksImV4cCI6MjA4NDUxNDk5OX0.5v5J_ujbzBF8aMWxhgpM1tzwOIMmnEM4GLgUzdIxO_c";
// ════════════════════════════════════════════════

let allData = [];
let activeFilter = 'all';

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' })
       + ' ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
}

function renderStats(data) {
  const total   = data.length;
  const pending = data.filter(d => d.status === 0).length;
  const done    = data.filter(d => d.status === 1).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><strong>${total}</strong> total</div>
    <div class="stat pend"><strong>${pending}</strong> pendentes</div>
    <div class="stat done"><strong>${done}</strong> incluídos</div>`;
}

function renderList(data) {
  const list = document.getElementById('list');
  if (!data.length) {
    list.innerHTML = '<div class="state-msg">Nenhum pedido encontrado.</div>';
    return;
  }
  list.innerHTML = data.map(item => {
    const isPending = item.status === 0;
    const dotClass  = isPending ? 'pending' : 'done';
    const badge     = isPending
      ? '<span class="status-badge badge-pending">pendente</span>'
      : '<span class="status-badge badge-done">incluído</span>';
    const metaParts = [];
    if (item.requested_by) metaParts.push(`pedido por <b>${item.requested_by}</b>`);
    if (!isPending && item.uploaded_by) metaParts.push(`incluído por <b>${item.uploaded_by}</b>`);
    const dateStr = isPending
      ? fmtDate(item.requested_at)
      : fmtDate(item.uploaded_at || item.requested_at);
    const searchData = [
      item.song || '',
      item.requested_by || '',
      item.uploaded_by || ''
    ].join(' ').toLowerCase();

    return `
      <div class="pedido-card" data-status="${item.status}" data-search="${searchData}">
        <div class="status-dot ${dotClass}"></div>
        <div class="pedido-info">
          <div class="pedido-song">${item.song || '—'}</div>
          <div class="pedido-meta">${metaParts.join(' · ')}</div>
        </div>
        <div class="pedido-right">
          ${badge}
          <div class="pedido-date">${dateStr}</div>
        </div>
      </div>`;
  }).join('');
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.pedido-card').forEach(card => {
    const statusMatch = activeFilter === 'all' || card.dataset.status === activeFilter;
    const searchMatch = !q || card.dataset.search.includes(q);
    card.classList.toggle('hidden', !(statusMatch && searchMatch));
  });
}

async function load() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/inclusions?select=*&order=requested_at.desc&limit=200`,
      { headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
      }}
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    allData = await res.json();
    renderStats(allData);
    renderList(allData);
  } catch(e) {
    document.getElementById('list').innerHTML =
      `<div class="state-msg">Erro ao carregar: ${e.message}</div>`;
    document.getElementById('stats').innerHTML =
      `<div class="stat">Erro ao conectar ao banco</div>`;
  }
}

// ── Filtros ───────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.filter;
    applyFilters();
  });
});

// ── Busca ─────────────────────────────────────
document.getElementById('search').addEventListener('input', applyFilters);

// ── Init ──────────────────────────────────────
load();
</script>
</body>
</html>
